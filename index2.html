<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>文本排列</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    html, body { width: 100%; height: 100%; overflow: hidden; background: #f5f0e8; touch-action: none; font-family: 'Noto Sans SC', 'Microsoft YaHei', Arial, sans-serif; }
    #container {
      position: relative;
      width: 100%;
      max-width: 680px;
      margin: 0 auto;
      padding: 12px 16px;
      user-select: none;
      -webkit-user-select: none;
    }
    .letter {
      position: absolute;
      top: 0; left: 0;
      will-change: transform;
      font-family: 'Georgia', serif;
      font-size: 20px;
      line-height: 1;
      color: #4a4a4a;
      pointer-events: none;
    }
    .letter.draggable {
      pointer-events: auto;
      cursor: grab;
      z-index: 10;
      touch-action: none;
    }
    .splash {
      position: absolute;
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(71, 116, 255, 0.75);
      pointer-events: none;
      transform: scale(0);
      animation: splash 0.6s ease-out forwards;
      z-index: 5;
    }
    .splash-particle {
      position: absolute;
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: rgba(71, 116, 255, 0.8);
      pointer-events: none;
      z-index: 4;
    }
    .letter.transforming {
      animation: transformToBird 0.3s ease-in-out forwards;
    }
    @keyframes transformToBird {
      0% { transform: scale(1) rotate(0deg); opacity: 1; filter: blur(0px); }
      25% { transform: scale(1.1) rotate(90deg); opacity: 0.8; filter: blur(1px); }
      50% { transform: scale(0.9) rotate(180deg); opacity: 0.6; filter: blur(2px); }
      75% { transform: scale(1.2) rotate(270deg); opacity: 0.4; filter: blur(1px); }
      100% { transform: scale(0.8) rotate(360deg); opacity: 0; filter: blur(0px); }
    }
    .letter.dragging {
      cursor: grabbing;
    }
    @keyframes windBlow {
      0% { opacity: 0; }
      50% { opacity: 1; }
      100% { opacity: 0; }
    }
    @keyframes windParticle {
      0% { transform: translateX(0) rotate(0deg); opacity: 0.6; }
      100% { transform: translateX(200px) rotate(360deg); opacity: 0; }
    }
    @keyframes birdFlap {
      0%, 100% {
        transform: scale(1) rotate(360deg) scaleY(1) scaleX(1);
      }
      25% {
        transform: scale(1) rotate(360deg) scaleY(0.85) scaleX(1.05);
      }
      50% {
        transform: scale(1) rotate(360deg) scaleY(1.15) scaleX(0.95);
      }
      75% {
        transform: scale(1) rotate(360deg) scaleY(0.9) scaleX(1.02);
      }
    }
    #kitelineCanvas {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      z-index: 25;
    }
  </style>
</head>
<body>
  <div id="container"></div>

  <script type="module">
    import { prepareWithSegments, layoutWithLines } from './pretext.js';

    const FULL_TEXT = "盼望着，盼望着，东风来了，春天的脚步近了。一切都像刚睡醒的样子，欣欣然张开了眼。山朗润起来了，水涨起来了，太阳的脸红起来了。小草偷偷地从土里钻出来，嫩嫩的，绿绿的。园子里，田野里，瞧去，一大片一大片满是的。坐着，躺着，打两个滚，踢几脚球，赛几趟跑，捉几回迷藏。";
    const SHORT_TEXT = "盼望着，盼望着，东风来了，春天的脚步近了。一切都像刚睡醒的样子，欣欣然张开了眼。山朗润起来了，水涨起来了，太阳的脸红起来了。小草偷偷地从土里钻出来，嫩嫩的，绿绿的。";
    const TEXT = window.innerWidth < 600 ? SHORT_TEXT : FULL_TEXT;
    const FONT = '20px "Noto Serif SC", "Microsoft YaHei", serif';
    const LINE_HEIGHT = 32;
    const CONSTRAINT_DIST = 1.2;
    const UNLOCK_THRESHOLD = 1;
    const ITERATIONS = 12;
    const DAMPING = 0.97;
    const GRAVITY = 0.15;
    let gravityOn = true;
    let unraveling = false;
    let unravelIdx = -1;
    window.addEventListener('keydown', (e) => {
      if (e.key === 'f' || e.key === 'F') {
        gravityOn = !gravityOn;
        if (gravityOn && !unraveling) {
          unraveling = true;
          hint.style.opacity = '0';
          unravelIdx = letters.length - 1;
          while (unravelIdx >= 0 && !letters[unravelIdx].locked) unravelIdx--;
        }
      }
    });

    const container = document.getElementById('container');
    const measureCtx = document.createElement('canvas').getContext('2d');
    measureCtx.font = FONT;

    // Prepare text once with pretext
    const prepared = prepareWithSegments(TEXT, FONT);
    const MARGIN = 20;
    const segmenter = new Intl.Segmenter(undefined, { granularity: 'grapheme' });

    function getMaxWidth() {
      return container.getBoundingClientRect().width - MARGIN * 2;
    }

    // Measure all graphemes once — these never change
    const allGraphemes = [...segmenter.segment(TEXT)].map(s => s.segment);
    const graphemeWidths = allGraphemes.map(g => measureCtx.measureText(g).width);

    // Get reading-order positions for each grapheme at a given width.
    // We do our own word-wrap using pretext's measured widths as ground truth,
    // but track every grapheme including trailing spaces so the count always
    // matches allGraphemes.length.
    function layoutPositions(maxWidth) {
      // First pass: compute line breaks to get total height
      const rawPositions = [];
      let x = 0;
      let lineY = 0;

      for (let gi = 0; gi < allGraphemes.length; gi++) {
        const g = allGraphemes[gi];
        const w = graphemeWidths[gi];

        if (g === ' ' && x > 0) {
          let wordW = 0;
          for (let j = gi + 1; j < allGraphemes.length && allGraphemes[j] !== ' '; j++) {
            wordW += graphemeWidths[j];
          }
          if (x + w + wordW > maxWidth) {
            rawPositions.push({ x: x + MARGIN, y: lineY, w });
            x = 0;
            lineY += LINE_HEIGHT;
            continue;
          }
        }

        if (x > 0 && x + w > maxWidth) {
          // 中文/无空格文本换行：当当前字符放不下时换行
          x = 0;
          lineY += LINE_HEIGHT;
        }

        rawPositions.push({ x: x + MARGIN, y: lineY, w });
        x += w;
      }

      // Vertical center offset
      const totalHeight = lineY + LINE_HEIGHT;
      const containerRect = container.getBoundingClientRect();
      const viewportHeight = window.innerHeight;
      const offsetY = Math.max(0, (viewportHeight - containerRect.top - totalHeight) * 0.3);

      return rawPositions.map(p => ({ x: p.x, y: p.y + offsetY, w: p.w }));
    }

    // Initial layout — compute positions and zig-zag ordering once
    let positions = layoutPositions(getMaxWidth());

    // Build zig-zag string order mapping (reading index -> string index) based on initial layout
    // This mapping is fixed — it never changes on resize
    function buildZigzagMapping(maxWidth) {
      const { lines } = layoutWithLines(prepared, maxWidth, LINE_HEIGHT);

      // Build per-line reading indices
      const lineIndices = [];
      let gi = 0;
      for (let li = 0; li < lines.length; li++) {
        const lineGraphemes = [...segmenter.segment(lines[li].text)].map(s => s.segment);
        const indices = [];
        for (let j = 0; j < lineGraphemes.length; j++) {
          indices.push(gi++);
        }
        lineIndices.push(indices);
      }

      // Zig-zag: snake so last line goes L->R
      const lastLineIdx = lineIndices.length - 1;
      const needFlip = lastLineIdx % 2 === 1;
      const stringOrder = []; // stringOrder[stringIdx] = readingIdx
      for (let li = 0; li < lineIndices.length; li++) {
        const reversed = needFlip ? (li % 2 === 0) : (li % 2 === 1);
        if (reversed) {
          stringOrder.push(...[...lineIndices[li]].reverse());
        } else {
          stringOrder.push(...lineIndices[li]);
        }
      }

      return stringOrder;
    }

    const stringOrder = buildZigzagMapping(getMaxWidth());

    // Build letters array in string order
    const letters = stringOrder.map(ri => {
      const p = positions[ri];
      return {
        ch: allGraphemes[ri],
        w: p.w,
        x: p.x, y: p.y,
        ox: p.x, oy: p.y,
        px: p.x, py: p.y,
        vx: 0, vy: 0,
        readingIdx: ri,
        locked: true,
        onGround: false
      };
    });

    // 拖拽后触发逐个下落队列
    const dropQueue = {
      active: false,
      nextIdx: 0,
      lastStep: 0
    };

    // 飞行模式状态
    let flyingMode = false;
    let flyingStartTime = 0;
    let bigBird = null; // 大燕子对象
    let bigBirdX = 0, bigBirdY = 0; // 大燕子的位置
    let lastBigBirdX = 0, lastBigBirdY = 0; // 上一个位置，用于计算方向
    let bigBirdAngle = 0; // 鸟的朝向角度

    function triggerDropSequence() {
      dropQueue.active = true;
      dropQueue.nextIdx = letters.length - 1;
      dropQueue.lastStep = performance.now();
    }

    function dropNextLetter() {
      if (dropQueue.nextIdx >= 0) {
        const l = letters[dropQueue.nextIdx];
        if (l.locked) {
          l.locked = false;
          l.px = l.x;
          l.py = l.y;
        }
        dropQueue.nextIdx--;
      } else {
        dropQueue.active = false;
        // 掉落完成，开始风吹和变大燕子
        startWindAndTransform();
      }
    }

    function startWindAndTransform() {
      // 风吹效果：屏幕变暗，添加风粒子
      const windOverlay = document.createElement('div');
      windOverlay.style.cssText = 'position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(200,200,200,0.3);pointer-events:none;z-index:20;animation:windBlow 2s ease-out forwards;';
      document.body.appendChild(windOverlay);

      // 风粒子
      for (let i = 0; i < 20; i++) {
        const particle = document.createElement('div');
        particle.style.cssText = `position:absolute;width:2px;height:20px;background:#fff;opacity:0.6;left:${Math.random()*100}%;top:${Math.random()*100}%;animation:windParticle 2s linear forwards;`;
        windOverlay.appendChild(particle);
      }

      // 风声音效
      playWindSound();

      setTimeout(() => {
        // 保持文字可见，将被小鸟拖拽
        // els.forEach(el => el.style.display = 'none');

        // 创建大燕子
        bigBird = document.createElement('div');
        
        // 创建GIF图片元素
        const birdImg = document.createElement('img');
        birdImg.src = 'flying-bird.gif'; // 这只鸟的GIF文件名（请将图像文件放在项目根目录）
        birdImg.onerror = () => {
          console.warn('flying-bird.gif 未找到，使用默认备份图像。');
          birdImg.src = 'flying-bird.gif';
        };
        birdImg.style.cssText = 'width:120px;height:90px;pointer-events:none;';
        bigBird.appendChild(birdImg);
        
        // 设置大燕子初始位置（在屏幕中央）
        const cRect = container.getBoundingClientRect();
        
        const birdSize = 120;
        const margin = 40;
        
        // 基于屏幕的安全范围
        const screenMinX = margin;
        const screenMaxX = window.innerWidth - margin - birdSize;
        const safeMinY = margin;
        const safeMaxY = window.innerHeight - margin - 90;
        
        // 初始位置在屏幕中央（窗口坐标），然后转换为container相对坐标
        const initialAbsX = window.innerWidth / 2 - 60;
        bigBirdX = initialAbsX - cRect.left; // 转换为container相对坐标
        bigBirdY = Math.max(safeMinY, Math.min(safeMaxY, window.innerHeight / 2 - 45));
        
        bigBird.style.cssText = `position:absolute;pointer-events:none;z-index:30;left:0;top:0;transform:scale(0);animation:birdAppear 0.5s ease-out forwards;`;
        container.appendChild(bigBird);
        
        // 调试：检查bigBird是否正确添加到DOM
        console.log('bigBird created and added to container:', bigBird);
        console.log('container children:', container.children);

        // 创建风筝线Canvas
        const kitelineCanvas = document.createElement('canvas');
        kitelineCanvas.id = 'kitelineCanvas';
        kitelineCanvas.width = window.innerWidth;
        kitelineCanvas.height = window.innerHeight;
        container.appendChild(kitelineCanvas);
        window.kitelineCtx = kitelineCanvas.getContext('2d');

        // 移除风效果
        windOverlay.remove();

        // 等待动画结束后开始飞行
        setTimeout(() => {
          console.log('Starting flying mode, bigBird animation should be complete');
          
          bigBird.style.left = `${bigBirdX}px`;
          bigBird.style.top = `${bigBirdY}px`;
          bigBird.style.transform = `scale(1)`;
          flyingMode = true;
          flyingStartTime = performance.now();
          console.log('Flying mode activated at:', flyingStartTime, 'initial pos:', bigBirdX, bigBirdY);
        }, 500);
      }, 2000);
    }

    function spawnSplash(x, y) {
      // 音效：落地声
      playImpactSound();

      // 中心溅射圆点
      const s = document.createElement('div');
      s.className = 'splash';
      s.style.left = `${x - 5}px`;
      s.style.top = `${y - 5}px`;
      container.appendChild(s);
      setTimeout(() => s.remove(), 700);

      // 生成 10 个随机方向的粒子
      const particleCount = 10;
      for (let i = 0; i < particleCount; i++) {
        const angle = (Math.random() * Math.PI * 2); // 0 ~ 2π 随机角度
        const distance = 60 + Math.random() * 100; // 60~160px 随机距离
        const upOffset = -60 - Math.random() * 60; // 向上 60~120px

        const px = x + Math.cos(angle) * distance;
        const py = y + upOffset;

        const particle = document.createElement('div');
        particle.className = 'splash-particle';
        particle.style.left = `${x - 3}px`;
        particle.style.top = `${y - 3}px`;
        container.appendChild(particle);

        // 触发动画：平移到终点并消失
        requestAnimationFrame(() => {
          particle.style.transition = `all 0.7s ease-out`;
          particle.style.transform = `translate(${px - x}px, ${py - y}px)`;
          particle.style.opacity = '0';
        });

        setTimeout(() => particle.remove(), 750);
      }

      // 音效：溅射声
      //setTimeout(() => playSplashSound(), 100);
    }

    // 落地冲击音效
    function playImpactSound() {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioContext.currentTime;
        
        // 低频冲击音
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        
        osc.frequency.setValueAtTime(150, now);
        osc.frequency.exponentialRampToValueAtTime(50, now + 0.1);
        
        gain.gain.setValueAtTime(0.3, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.15);
        
        osc.start(now);
        osc.stop(now + 0.15);
      } catch (e) {
        // 浏览器不支持 Web Audio API
      }
    }

    // 溅射音效
    function playSplashSound() {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioContext.currentTime;
        
        // 高频嘶鸣声
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        osc.connect(gain);
        gain.connect(audioContext.destination);
        
        osc.frequency.setValueAtTime(400, now);
        osc.frequency.exponentialRampToValueAtTime(2000, now + 0.05);
        osc.frequency.exponentialRampToValueAtTime(150, now + 0.25);
        
        gain.gain.setValueAtTime(0.15, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 0.25);
        
        osc.start(now);
        osc.stop(now + 0.25);
      } catch (e) {
        // 浏览器不支持 Web Audio API
      }
    }

    // 风吹音效
    function playWindSound() {
      try {
        const audioContext = new (window.AudioContext || window.webkitAudioContext)();
        const now = audioContext.currentTime;
        
        // 低频风声
        const osc = audioContext.createOscillator();
        const gain = audioContext.createGain();
        const filter = audioContext.createBiquadFilter();
        
        osc.connect(filter);
        filter.connect(gain);
        gain.connect(audioContext.destination);
        
        filter.type = 'lowpass';
        filter.frequency.setValueAtTime(200, now);
        filter.frequency.exponentialRampToValueAtTime(50, now + 2);
        
        osc.frequency.setValueAtTime(80, now);
        osc.frequency.setValueAtTime(60, now + 1);
        
        gain.gain.setValueAtTime(0.2, now);
        gain.gain.exponentialRampToValueAtTime(0.01, now + 2);
        
        osc.start(now);
        osc.stop(now + 2);
      } catch (e) {
        // 浏览器不支持 Web Audio API
      }
    }

    // Compute rest lengths in string order
    function computeRestLengths() {
      const rests = [];
      for (let i = 0; i < letters.length - 1; i++) {
        const a = letters[i], b = letters[i + 1];
        const dist = Math.hypot(
          (b.ox + b.w / 2) - (a.ox + a.w / 2),
          (b.oy + LINE_HEIGHT / 2) - (a.oy + LINE_HEIGHT / 2)
        );
        rests.push(dist * CONSTRAINT_DIST);
      }
      return rests;
    }

    let restLengths = computeRestLengths();

    // DOM elements
    const els = [];
    for (const l of letters) {
      const span = document.createElement('span');
      span.className = 'letter';
      span.textContent = l.ch;
      container.appendChild(span);
      els.push(span);
    }

    // Unlock last 6
    const lastIdx = letters.length - 1;
    for (let i = lastIdx; i > lastIdx - 6; i--) {
      letters[i].locked = false;
      els[i].classList.add('draggable');
    }

    // 拖动提示
    const hint = document.createElement('div');
    hint.textContent = '拖动我';
    hint.style.cssText = 'position:absolute;top:0;left:0;padding:4px 8px;background:rgba(255,255,255,0.9);border-radius:8px;font-size:14px;color:#4a4a4a;pointer-events:none;opacity:0;transition:opacity 0.8s;box-shadow:0 2px 8px rgba(0,0,0,0.15);';
    container.appendChild(hint);
    function positionHint() {
      const last = letters[lastIdx];
      hint.style.transform = `translate(${last.ox - 30}px, ${last.oy + LINE_HEIGHT + 2}px)`;
    }
    positionHint();
    setTimeout(() => { hint.style.opacity = '1'; }, 500);

    // Resize: relayout locked letters using their fixed reading-order index
    window.addEventListener('resize', () => {
      const newPositions = layoutPositions(getMaxWidth());
      for (let i = 0; i < letters.length; i++) {
        const np = newPositions[letters[i].readingIdx];
        if (letters[i].locked) {
          letters[i].x = np.x;
          letters[i].y = np.y;
          letters[i].ox = np.x;
          letters[i].oy = np.y;
          letters[i].px = np.x;
          letters[i].py = np.y;
        } else {
          letters[i].ox = np.x;
          letters[i].oy = np.y;
        }
      }
      // Rest lengths stay fixed — the string doesn't change length
      positionHint();
    });

    // Drag state — multitouch: map pointerId -> { idx, offsetX, offsetY }
    const drags = new Map();

    function isDragged(idx) {
      for (const d of drags.values()) if (d.idx === idx) return true;
      return false;
    }

    container.addEventListener('pointerdown', (e) => {
      const idx = els.indexOf(e.target);
      if (idx === -1 || letters[idx].locked) return;
      // Don't allow two fingers on the same letter
      if (isDragged(idx)) return;
      const rect = container.getBoundingClientRect();
      drags.set(e.pointerId, {
        idx,
        offsetX: e.clientX - rect.left - letters[idx].x,
        offsetY: e.clientY - rect.top - letters[idx].y
      });
      els[idx].classList.add('dragging');
      e.target.setPointerCapture(e.pointerId);
      e.preventDefault();
    });

    window.addEventListener('pointermove', (e) => {
      const d = drags.get(e.pointerId);
      if (!d) return;
      const rect = container.getBoundingClientRect();
      const l = letters[d.idx];
      l.x = e.clientX - rect.left - d.offsetX;
      l.y = e.clientY - rect.top - d.offsetY;
      l.px = l.x;
      l.py = l.y;
      l.locked = false;
    });

    window.addEventListener('pointerup', (e) => {
      const d = drags.get(e.pointerId);
      if (!d) return;
      els[d.idx].classList.remove('dragging');
      drags.delete(e.pointerId);
      triggerDropSequence();
    });

    window.addEventListener('pointercancel', (e) => {
      const d = drags.get(e.pointerId);
      if (!d) return;
      els[d.idx].classList.remove('dragging');
      drags.delete(e.pointerId);
    });

    // Physics
    function simulate() {
      // Unravel step (one letter per fixed tick)
      if (unraveling) {
        if (!gravityOn || unravelIdx < 0) { unraveling = false; }
        else if (letters[unravelIdx].locked) {
          letters[unravelIdx].locked = false;
          letters[unravelIdx].px = letters[unravelIdx].x;
          letters[unravelIdx].py = letters[unravelIdx].y - 0.5;
          unravelIdx--;
        } else {
          unravelIdx--;
        }
      }

      // Unlock propagation
      if (!flyingMode) {
        for (let i = letters.length - 2; i >= 0; i--) {
          if (letters[i].locked && !letters[i + 1].locked) {
            const a = letters[i], b = letters[i + 1];
            const dx = (b.x + b.w / 2) - (a.ox + a.w / 2);
            const dy = (b.y + LINE_HEIGHT / 2) - (a.oy + LINE_HEIGHT / 2);
            const dist = Math.hypot(dx, dy);
            if (dist > restLengths[i] + UNLOCK_THRESHOLD) {
              a.locked = false;
              a.px = a.x;
              a.py = a.y;
              hint.style.opacity = '0';
            }
          }
        }
      }

      // Verlet
      for (let i = 0; i < letters.length; i++) {
        const l = letters[i];
        if (l.locked || isDragged(i)) continue;

        if (!flyingMode) {
          // 正常下落物理
          const vx = (l.x - l.px) * DAMPING;
          const vy = (l.y - l.py) * DAMPING;
          l.px = l.x;
          l.py = l.y;
          l.x += vx;
          l.y += vy + (gravityOn ? GRAVITY : 0);
        }
      }

  // 大燕子飞行物理（独立于 letters 循环）
if (flyingMode && bigBird) {
  const elapsed = (performance.now() - flyingStartTime) / 1000;
  
  const birdW = 120;
  const birdH = 90;
  const margin = 10;
  
  // 基于整个屏幕宽度的飞行范围
  const minX = margin;
  const maxX = window.innerWidth - margin - birdW;
  
  // 自然鸟类飞行轨迹 - 大范围上下起伏
  const period = 15; // 15 秒一个完整周期
  const t = (elapsed % period) / period;
  
  // 水平运动：从左到右往返
  const horizontalPos = (Math.sin(t * Math.PI * 2 - Math.PI / 2) + 1) / 2; // 0~1
  const horizontalWave = Math.sin(t * Math.PI * 4) * 0.08 + Math.sin(t * Math.PI * 6) * 0.04;
  let targetAbsX = minX + (maxX - minX) * (horizontalPos + horizontalWave);
  
  // 竖直运动：大范围上下起伏（像真正的鸟）
  // 使用多个正弦波叠加，创建不规则但流畅的轨迹
  const mainVertical = Math.sin(t * Math.PI * 2) * 0.9; // 主波动
  const secondaryVertical = Math.sin(t * Math.PI * 4 + 1.5) * 0.6; // 次级波动
  const tertiaryVertical = Math.sin(t * Math.PI * 8 + 0.8) * 0.3; // 细微波动
  
  // 垂直范围：从屏幕顶部 15% 到底部 85%（大范围）
  const topLimit = window.innerHeight * 0.15;
  const bottomLimit = window.innerHeight * 0.85 - birdH;
  const verticalRange = bottomLimit - topLimit;
  
  // 组合垂直位置
  const verticalOffset = (mainVertical + secondaryVertical * 0.7 + tertiaryVertical * 0.4) / 1.8;
  let targetY = topLimit + (verticalRange / 2) * (verticalOffset + 1);
  
  // 高频翅膀拍打效果（不影响整体高度）
  const wingFlap = Math.sin(elapsed * 5) * 12 + Math.sin(elapsed * 3.5) * 6;
  targetY += wingFlap;
  
  // 边界限制
  targetY = Math.max(margin, Math.min(window.innerHeight - margin - birdH, targetY));
  targetAbsX = Math.max(minX, Math.min(maxX, targetAbsX));
  
  // 转换为相对于 container 的坐标
  const cRect = container.getBoundingClientRect();
  const targetX = targetAbsX - cRect.left;
  
  // 平滑移动
  const lerpFactor = 0.08;
  bigBirdX += (targetX - bigBirdX) * lerpFactor;
  bigBirdY += (targetY - bigBirdY) * lerpFactor;
  
  // 强制限制
  bigBirdX = Math.max(minX - cRect.left, Math.min(maxX - cRect.left, bigBirdX));
  bigBirdY = Math.max(margin, Math.min(window.innerHeight - margin - birdH, bigBirdY));
  
  // 计算飞行朝向
  const dx = bigBirdX - lastBigBirdX;
  const dy = bigBirdY - lastBigBirdY;
  const movementMag = Math.hypot(dx, dy);
  
  if (movementMag > 0.3) {
    bigBirdAngle = Math.atan2(dy, dx) * 180 / Math.PI;
    lastBigBirdX = bigBirdX;
    lastBigBirdY = bigBirdY;
  }
  
  // 翅膀拍打动画
  const baseWingFreq = 4.5 + Math.abs(dx) * 2;
  const wingFlap2 = Math.sin(elapsed * baseWingFreq) * 0.12;
  const flapScale = 1 + wingFlap2 + Math.abs(Math.sin(elapsed * 2.5)) * 0.08;
  
  bigBird.style.transform = `rotate(${bigBirdAngle}deg) scale(${flapScale})`;
}else {
        console.log('Flying mode:', flyingMode, 'bigBird:', !!bigBird);
      }

      // Distance constraints
      for (let iter = 0; iter < ITERATIONS; iter++) {
        for (let i = 0; i < letters.length - 1; i++) {
          const a = letters[i], b = letters[i + 1];
          if (a.locked && b.locked) continue;
          
          const ax = a.x + a.w / 2, ay = a.y + LINE_HEIGHT / 2;
          const bx = b.x + b.w / 2, by = b.y + LINE_HEIGHT / 2;
          const dx = bx - ax, dy = by - ay;
          const dist = Math.hypot(dx, dy) || 0.001;
          const diff = (dist - restLengths[i]) / dist;
          const aFixed = a.locked || isDragged(i);
          const bFixed = b.locked || isDragged(i + 1);
          if (aFixed && !bFixed) {
            b.x -= dx * diff; b.y -= dy * diff;
          } else if (!aFixed && bFixed) {
            a.x += dx * diff; a.y += dy * diff;
          } else if (!aFixed && !bFixed) {
            a.x += dx * diff * 0.5; a.y += dy * diff * 0.5;
            b.x -= dx * diff * 0.5; b.y -= dy * diff * 0.5;
          }
        }
      }

      // 飞行模式下：最后一个字符被小鸟拉向上方（风筝线效果）
      if (flyingMode && bigBird) {
        const lastLetter = letters[letters.length - 1];
        const birdActualX = bigBirdX + 60; // 小鸟中心
        const birdActualY = bigBirdY + 45;
        
        // 将最后一个字符拉向小鸟
        const letterCenterX = lastLetter.x + lastLetter.w / 2;
        const letterCenterY = lastLetter.y + LINE_HEIGHT / 2;
        
        const dx = birdActualX - letterCenterX;
        const dy = birdActualY - letterCenterY;
        const dist = Math.hypot(dx, dy) || 0.01;
        
        // 风筝线长度约束（允许一些松弛以创建自然曲线）
        const kitelineLength = dist * 0.85; // 拉力强度
        const diff = (dist - kitelineLength) / dist;
        
        // 应用拉力
        lastLetter.x += dx * diff * 0.15; // 相对温和的拉力
        lastLetter.y += dy * diff * 0.15;
      }

      // Letter collision
      const RADIUS = 7;
      if (!flyingMode || !bigBird) { // 飞行模式下禁用碰撞，大燕子不需要碰撞
        for (let i = 0; i < letters.length; i++) {
          if (letters[i].locked) continue;
          const a = letters[i];
          const acx = a.x + a.w / 2, acy = a.y + LINE_HEIGHT / 2;
          for (let j = i + 1; j < letters.length; j++) {
            if (letters[j].locked) continue;
            if (Math.abs(i - j) === 1) continue;
            const b = letters[j];
            const bcx = b.x + b.w / 2, bcy = b.y + LINE_HEIGHT / 2;
            const dx = bcx - acx, dy = bcy - acy;
            const dist = Math.hypot(dx, dy) || 0.001;
            const minDist = RADIUS * 2;
            if (dist < minDist) {
              const overlap = (minDist - dist) / dist * 0.5;
              const aD = isDragged(i);
              const bD = isDragged(j);
              if (aD) { b.x += dx * overlap; b.y += dy * overlap; }
              else if (bD) { a.x -= dx * overlap; a.y -= dy * overlap; }
              else { a.x -= dx * overlap; a.y -= dy * overlap; b.x += dx * overlap; b.y += dy * overlap; }
            }
          }
        }
      }

      // 下落队列（拖动后逐个解锁）- 鞭炮效果需要快速
      if (dropQueue.active && performance.now() - dropQueue.lastStep > 20) {
        dropNextLetter();
        dropQueue.lastStep = performance.now();
      }

      // Boundary
      const cRect = container.getBoundingClientRect();
      const minX = -cRect.left;
      const minY = -cRect.top;
      const maxX = window.innerWidth - cRect.left;
      const maxY = window.innerHeight - cRect.top;
      const bounce = 0.4;
      const groundY = maxY - LINE_HEIGHT;
      for (let i = 0; i < letters.length; i++) {
        const l = letters[i];
        if (l.locked || isDragged(i)) continue;

        // 下落模式边界
        if (!flyingMode) {
          if (l.x < minX) { l.x = minX; l.px = l.x + (l.x - l.px) * bounce; }
          if (l.x + l.w > maxX) { l.x = maxX - l.w; l.px = l.x + (l.x - l.px) * bounce; }
          if (l.y < minY) { l.y = minY; l.py = l.y + (l.y - l.py) * bounce; }

          const vy = l.y - l.py;
          if (l.y + LINE_HEIGHT > maxY) {
            if (!l.onGround && vy > 0.75) {
              spawnSplash(l.x + l.w / 2, groundY);
            }
            l.y = groundY;
            l.py = l.y + (l.y - l.py) * bounce;
            l.onGround = true;
          } else {
            l.onGround = false;
          }
        }
      }

      // 大燕子飞行边界（现在在目标计算中已经限制，不会飞出屏幕）
      // 移除旧的重置逻辑，现在鸟会在屏幕内自然飞行
    }

    // Fixed-timestep loop: simulate at 60Hz regardless of display refresh rate
    const FIXED_DT = 1 / 120;
    const MAX_STEPS = 4; // cap to avoid spiral of death
    let accumulator = 0;
    let lastTime = -1;

    function render(now) {
      if (lastTime < 0) { lastTime = now; requestAnimationFrame(render); return; }
      const dt = Math.min((now - lastTime) / 1000, MAX_STEPS * FIXED_DT);
      lastTime = now;
      accumulator += dt;

      while (accumulator >= FIXED_DT) {
        simulate();
        accumulator -= FIXED_DT;
      }

      for (let i = 0; i < letters.length; i++) {
        if (!letters[i].locked) els[i].classList.add('draggable');
        els[i].style.transform = `translate(${letters[i].x}px, ${letters[i].y}px)`;
      }

      // 更新大燕子位置和风筝线
      if (bigBird && flyingMode) {
        // GIF本身就有翅膀动画，不需要额外切换

        // 更新位置和朝向
        bigBird.style.left = `${bigBirdX}px`;
        bigBird.style.top = `${bigBirdY}px`;
        bigBird.style.transform = `rotate(${bigBirdAngle}deg)`;

        // 绘制风筝线
        if (window.kitelineCtx) {
          const ctx = window.kitelineCtx;
          ctx.clearRect(0, 0, ctx.canvas.width, ctx.canvas.height);
          
          const birdActualX = bigBirdX + 60;
          const birdActualY = bigBirdY + 45;
          
          // 绘制从最后一个字符到小鸟的线条
          if (letters.length > 0) {
            const lastLetter = letters[letters.length - 1];
            const letterCenterX = lastLetter.x + lastLetter.w / 2;
            const letterCenterY = lastLetter.y + LINE_HEIGHT / 2;
            
            // 绘制曲线（风筝线）
            ctx.strokeStyle = 'rgba(100, 150, 200, 0.6)';
            ctx.lineWidth = 1;
            ctx.setLineDash([5, 5]); // 虚线效果
            ctx.beginPath();
            ctx.moveTo(letterCenterX, letterCenterY);
            
            // 添加控制点创建曲线
            const midX = (letterCenterX + birdActualX) / 2;
            const midY = (letterCenterY + birdActualY) / 2;
            ctx.quadraticCurveTo(midX + 30, midY, birdActualX, birdActualY);
            ctx.stroke();
            ctx.setLineDash([]);
          }
        }
      }

      requestAnimationFrame(render);
    }

    requestAnimationFrame(render);
  </script>
</body>
</html>
